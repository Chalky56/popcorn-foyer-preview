<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criterion Foyer Display</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="nextgen-foyer" data-phase="preshow">
<div class="ng-shell">
  <div class="ng-watermark" aria-hidden="true"></div>

  <!-- Ambient layers (ported from popcorn-foyer-preview.html) -->
  <div class="ng-ambient" aria-hidden="true">
    <span class="kernel k1"></span>
    <span class="kernel k2"></span>
    <span class="kernel k3"></span>
    <span class="kernel k4"></span>
    <span class="kernel k5"></span>
    <span class="kernel k6"></span>
    <svg class="ng-bucket" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="wmGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FF1A75"/>
          <stop offset="100%" stop-color="#B43BFF"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#wmGrad)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">
        <circle cx="31" cy="41" r="5"/>
        <circle cx="41" cy="38" r="5.5"/>
        <circle cx="52" cy="39" r="5.5"/>
        <circle cx="62" cy="38" r="5.5"/>
        <circle cx="71" cy="41" r="5"/>
        <circle cx="44" cy="27" r="5.5"/>
        <circle cx="55" cy="27" r="5.5"/>
        <circle cx="50" cy="18" r="4.5"/>
        <path d="M 27 56 L 32 112 L 68 112 L 73 56"/>
        <line x1="40" y1="61" x2="42" y2="112"/>
        <line x1="50" y1="61" x2="50" y2="112"/>
        <line x1="60" y1="61" x2="58" y2="112"/>
        <rect x="20" y="46" width="60" height="10" rx="5" fill="#1A0E2A"/>
      </g>
    </svg>
  </div>

  <div class="on-air" id="on-air"><span class="on-air-dot"></span> <span>ON AIR</span></div>

  <div class="ng-topline">
    <div class="ng-phase" id="phase-label">Loading</div>
    <div class="ng-show" id="show-label">Criterion Theatre</div>
  </div>
  <div class="ng-stage" id="stage"></div>
  <div class="ng-caption" id="caption"></div>

  <div class="criterion-mark" title="The Criterion Theatre, Earlsdon" aria-hidden="true">
    <img src="assets/criterion-logo-neon.png?v=2" alt="">
  </div>
</div>

<script type="module">
  import { getActiveShow, startShowPolling } from "./js/show-resolver.js";
  import { loadTheme } from "./js/theme-loader.js";
  import { Scheduler } from "./js/scheduler.js";
  import { renderSlideHTML } from "./js/slide-templates.js";

  const params = new URLSearchParams(window.location.search);
  const dwellSeconds = params.get("dwell");
  function resolveRoute(searchParams) {
    const raw = (searchParams.get("phase") || searchParams.get("scene") || "preshow")
      .trim()
      .toLowerCase();
    const phases = new Set(["preshow", "interval", "postshow"]);
    const singleRoutes = {
      welcome: "welcome",
      tonight: "show-info",
    };
    if (raw === "coming-soon") {
      return {
        name: raw,
        phase: "preshow",
        template: null,
        heldTemplates: ["next-production", "next-production-2"],
      };
    }
    if (phases.has(raw)) {
      return { name: raw, phase: raw, template: null };
    }
    if (singleRoutes[raw]) {
      return { name: raw, phase: "preshow", template: singleRoutes[raw] };
    }
    return null;
  }

  function escapeHTML(value) {
    return String(value).replace(/[&<>"']/g, (character) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    })[character]);
  }

  const route = resolveRoute(params);
  const phase = route?.name || null;
  const houseOpen = params.get("houseOpen") === "1";
  const stage = document.getElementById("stage");
  const caption = document.getElementById("caption");
  const showLabel = document.getElementById("show-label");
  const phaseLabel = document.getElementById("phase-label");
  document.body.dataset.phase = route?.phase || "unavailable";
  let scheduler = null;
  let timer = null;
  let countdownTimer = null;
  let showInfo = null;
  let ctx = null;
  const missingSources = new Set();

  async function fetchJson(url) {
    const response = await fetch(`${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`, { cache: "no-store" });
    if (!response.ok) {
      throw new Error(`Failed to load ${url}`);
    }
    return response.json();
  }

  function describeItem(item) {
    if (!item) {
      return null;
    }
    if (item.template) {
      return item.template;
    }
    if (!item.source) {
      return item.tag || null;
    }
    try {
      const path = new URL(item.source).pathname;
      return path.split("/").slice(-2).join("/");
    } catch (error) {
      return item.source;
    }
  }

  async function updateState(current, next) {
    await fetch("api/state", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        show: showInfo?.id || null,
        phase,
        item: describeItem(current),
        next_item: describeItem(next),
      }),
    });
  }

  function setCaption(item) {
    caption.textContent = item?.tag
      ? `${item.tag.replace(/_/g, " ")}`
      : "";
  }

  function clearTimer() {
    if (timer) {
      window.clearTimeout(timer);
      timer = null;
    }
    if (countdownTimer) {
      window.clearInterval(countdownTimer);
      countdownTimer = null;
    }
  }

  function renderMissing(item) {
    if (!item?.source || missingSources.has(item.source)) {
      return;
    }
    missingSources.add(item.source);
    console.warn("Missing foyer asset:", item.source);
  }

  function renderSlide(entry) {
    document.body.classList.remove("media-active");
    ctx.countdown = getCountdownState();
    stage.innerHTML = renderSlideHTML(entry, ctx);
    if (entry.template === "countdown") {
      updateCountdown();
      countdownTimer = window.setInterval(updateCountdown, 60 * 1000);
    }
  }

  function renderVideo(item) {
    document.body.classList.add("media-active");
    stage.innerHTML = "";
    const video = document.createElement("video");
    video.className = "ng-media";
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    video.src = `${ctx.foyerPackBase.replace(/\/$/, "")}/${item.source.replace(/^\//, "")}`;
    video.onerror = () => {
      renderMissing(item);
      advance();
    };
    video.onended = () => advance();
    const videoMeta = ctx.videoItems[item.source] || item;
    if (videoMeta.captions?.required && videoMeta.captions?.verified !== true) {
      console.warn(
        "Spoken-word foyer video requires burnt-in open captions; playback is not blocked in Phase 1:",
        item.source,
      );
    }
    stage.appendChild(video);
  }

  function isVideo(item) {
    return Boolean(item?.source && /\.mp4($|\?)/i.test(item.source));
  }

  function dateAtTime(dateText, timeText) {
    if (!dateText || !/^\d{2}:\d{2}$/.test(timeText || "")) {
      return null;
    }
    const [year, month, day] = dateText.split("-").map(Number);
    const [hour, minute] = timeText.split(":").map(Number);
    return new Date(year, month - 1, day, hour, minute, 0, 0);
  }

  function minutesBetween(startText, endText) {
    const start = dateAtTime("2000-01-01", startText);
    let end = dateAtTime("2000-01-01", endText);
    if (!start || !end) {
      return null;
    }
    if (end < start) {
      end = new Date(end.getTime() + 24 * 60 * 60 * 1000);
    }
    return Math.round((end - start) / 60000);
  }

  function selectPerformance(performances) {
    const list = performances?.performances || [];
    const requestedDay = params.get("day");
    const today = new Date();
    const localDay = [
      today.getFullYear(),
      String(today.getMonth() + 1).padStart(2, "0"),
      String(today.getDate()).padStart(2, "0"),
    ].join("-");
    return list.find(entry => entry.date === requestedDay)
      || list.find(entry => entry.date === localDay)
      || list.find(entry => entry.date >= localDay)
      || list[list.length - 1]
      || null;
  }

  function countdownTarget(performance, showMeta) {
    if (!performance) {
      return null;
    }
    const intervalSignal = params.get("intervalNow") || params.get("now");
    const intervalMinutes = minutesBetween(
      performance.interval_at_estimated,
      performance.act_2_at_estimated,
    ) || Number(showMeta?.interval_minutes) || 20;
    if (intervalSignal) {
      const startedAt = dateAtTime(performance.date, intervalSignal);
      return startedAt
        ? new Date(startedAt.getTime() + intervalMinutes * 60000)
        : null;
    }
    return null;
  }

  function getCountdownState() {
    const target = ctx?.countdownTarget;
    if (!target) {
      return { minutes: null, state: "clear" };
    }
    const remainingMs = target.getTime() - Date.now();
    const countdownWindowMs = ((ctx.countdownWindowMinutes || 20) + 5) * 60000;
    if (remainingMs > 0) {
      if (remainingMs > countdownWindowMs) {
        return { minutes: null, state: "clear" };
      }
      return { minutes: Math.max(1, Math.ceil(remainingMs / 60000)), state: "counting" };
    }
    if (remainingMs >= -5 * 60000) {
      return { minutes: 0, state: "now" };
    }
    return { minutes: 0, state: "clear" };
  }

  function updateCountdown() {
    if (!ctx) {
      return;
    }
    const countdown = getCountdownState();
    ctx.countdown = countdown;
    const display = document.getElementById("countdown-display");
    const message = document.getElementById("countdown-caption");
    if (!display || !message) {
      return;
    }
    display.textContent = countdown.state === "counting"
      ? `${countdown.minutes} MIN`
      : (countdown.state === "now" ? "ACT II" : `~${ctx.countdownWindowMinutes} MIN INTERVAL`);
    message.textContent = countdown.state === "counting"
      ? "Please make your way back to your seats when you hear the bell."
      : (countdown.state === "now"
        ? "Please take your seats. Act II is about to begin."
        : "Please enjoy the interval.");
  }

  async function advance() {
    clearTimer();
    if (!scheduler) {
      return;
    }
    const current = scheduler.next();
    const next = scheduler.previewNext();
    if (!current) {
      return;
    }
    setCaption(current);
    if (isVideo(current)) {
      renderVideo(current);
    } else {
      renderSlide(current);
      timer = window.setTimeout(() => advance(), (current.dwell_seconds || 5) * 1000);
    }
    await updateState(current, next);
  }

  async function renderSingleRoute() {
    const current = { kind: "single", template: route.template, tag: route.name };
    setCaption(current);
    renderSlide(current);
    await updateState(current, null);
  }

  function heldRoutePlaylist(route, nextProductions) {
    const productionCount = nextProductions?.productions?.length || 0;
    return {
      items: (route.heldTemplates || [])
        .slice(0, productionCount)
        .map((template) => ({
          kind: "anchor",
          every_n: 1,
          template,
          tag: route.name,
          dwell_seconds: 11,
        })),
    };
  }

  async function buildScheduler() {
    showInfo = await getActiveShow();
    if (!showInfo?.paths?.foyerPack) {
      return;
    }
    const foyerPackBase = showInfo.paths.foyerPack;
    const showMeta = await fetchJson(`${foyerPackBase}/show.json`);
    let playlist = { items: [] };
    if (!route.template && !route.heldTemplates) {
      playlist = await fetchJson(`${foyerPackBase}/playlists/${route.phase}.json`);
    }
    let nextProductions = { productions: [] };
    let archiveMemories = { memories: [] };
    let performances = { performances: [] };
    try {
      nextProductions = await fetchJson(`${foyerPackBase}/next_productions.json`);
    } catch (error) {
      console.warn("next_productions.json unavailable:", error);
    }
    try {
      archiveMemories = await fetchJson(`${foyerPackBase}/archive_memories.json`);
    } catch (error) {
      console.warn("archive_memories.json unavailable:", error);
    }
    try {
      performances = await fetchJson(`${foyerPackBase}/performances.json`);
    } catch (error) {
      console.warn("performances.json unavailable:", error);
    }
    if (route.heldTemplates) {
      playlist = heldRoutePlaylist(route, nextProductions);
    }
    const performance = selectPerformance(performances);
    const countdownWindowMinutes = minutesBetween(
      performance?.interval_at_estimated,
      performance?.act_2_at_estimated,
    ) || Number(showMeta?.interval_minutes) || 20;
    ctx = {
      show: showMeta,
      nextProductions,
      archiveMemories,
      performances,
      performance,
      videoItems: Object.fromEntries(
        (playlist.items || [])
          .filter(item => isVideo(item))
          .map(item => [item.source, item]),
      ),
      countdownTarget: countdownTarget(performance, showMeta),
      countdownWindowMinutes,
      countdown: { minutes: null, state: "clear" },
      foyerPackBase,
    };
    showLabel.textContent = showMeta.title || showInfo.id;
    phaseLabel.textContent = route.name;
    if (!route.template) {
      scheduler = new Scheduler(playlist, {
        dwellSeconds,
        activeTriggers: houseOpen ? ["house-open"] : [],
      });
      await scheduler.init();
    }
  }

  function renderUnavailableRoute() {
    const requested = escapeHTML(params.get("phase") || params.get("scene") || "unknown");
    phaseLabel.textContent = "Unavailable";
    caption.textContent = "";
    stage.innerHTML = `<div class="slide active">
      <p class="eyebrow alert">Foyer scene not built</p>
      <h2 class="headline small">SCENE UNAVAILABLE</h2>
      <p class="body">No foyer phase is registered for <b style="color:var(--poster-yellow);">${requested}</b>.</p>
    </div>`;
  }

  async function boot() {
    await loadTheme();
    if (!route) {
      renderUnavailableRoute();
      return;
    }
    await buildScheduler();
    if (route.template) {
      await renderSingleRoute();
    } else {
      await advance();
    }
  }

  document.addEventListener("show:changed", async () => {
    clearTimer();
    await boot();
  });

  startShowPolling();
  boot();
</script>
</body>
</html>
